services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: "${TZ:-UTC}"
    command: sleep infinity
    cap_add:
      - NET_ADMIN
      - NET_RAW
# >>> STACK:depends_on
    depends_on:
      - db
# <<< STACK:depends_on
    environment:
      CLAUDE_CONFIG_DIR: /home/dev/.claude
      GIT_CONFIG_GLOBAL: /home/dev/.gitconfig.local
      # Commit identity resolved on the HOST by bin/devcontainer (from your global
      # git config, else GIT_AUTHOR_*/GIT_COMMITTER_*) and passed in via .env.
      # post_install writes these into ~/.gitconfig.local (this container's
      # GIT_CONFIG_GLOBAL), so the repo's own bind-mounted .git/config is never
      # touched. Empty when unresolved or already set repo-locally — post_install
      # skips them then.
      GIT_IDENT_NAME: "${GIT_IDENT_NAME:-}"
      GIT_IDENT_EMAIL: "${GIT_IDENT_EMAIL:-}"
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      PORT: "${PORT:-{{DEFAULT_PORT}}}"
      # The in-container server must bind all interfaces for Docker's port
      # forward to reach it. The app reads BIND_HOST (default 127.0.0.1 in
      # committed config) so host-run servers stay on loopback; only this
      # container overrides it to 0.0.0.0. Never hardcode 0.0.0.0 in app config.
      BIND_HOST: 0.0.0.0
# >>> STACK:db_env
      DATABASE_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
# <<< STACK:db_env
    init: true
# >>> STACK:browser
    # Reach a headless Chrome running on the HOST (for screenshots / visual
    # checks of the dev app). The container resolves host.docker.internal to the
    # host gateway; bin/chrome-host launches Chrome + a CDP relay, bin/chrome-cdp
    # prints the reachable CDP URL. Opt-in and dev-only — see references/
    # host-browser.md. Delete this block if the agent doesn't drive a browser.
    extra_hosts:
      - "host.docker.internal:host-gateway"
# <<< STACK:browser
    ports:
      - "127.0.0.1:${PORT:-{{DEFAULT_PORT}}}:${PORT:-{{DEFAULT_PORT}}}"
    volumes:
      # Workspace bind mount (consistency=delegated for macOS fs perf)
      - type: bind
        source: ..
        target: /workspace
        consistency: delegated
      # Git worktree support. A linked worktree's .git is just a pointer into the
      # MAIN repo's .git/worktrees/<name>, which lives OUTSIDE this worktree dir
      # and so is absent from the /workspace bind — without it, git can't find
      # the object store/refs and commits fail. Mount the git common dir and the
      # worktree's own host path at their REAL absolute paths (written to .env by
      # bin/devcontainer) so the worktree's gitdir/commondir/back-pointers resolve.
      # For a normal (non-worktree) checkout these are harmless self-mounts.
      - type: bind
        source: ${GIT_COMMON_DIR}
        target: ${GIT_COMMON_DIR}
        consistency: delegated
      - type: bind
        source: ${WORKTREE_HOST_DIR}
        target: ${WORKTREE_HOST_DIR}
        consistency: delegated
      # Only this repo's own git store is mounted (above). No host ~/.gitconfig,
      # SSH agent/keys, or push credentials are mounted: the container stays
      # self-contained. Base git config AND the commit identity come from
      # ~/.gitconfig.local (written by post_install.sh from the host-resolved
      # GIT_IDENT_*); the repo's own .git/config is untouched; push and commit
      # signing are done from the host.
      # Persistent caches and config
      - commandhistory:/commandhistory
      - claude-config:/home/dev/.claude
      - gh-config:/home/dev/.config/gh
# >>> STACK:cache_mounts
      # Shared toolchain caches (one mount per external cache volume), e.g.
      # - hex-cache:/home/dev/.hex
      # - mix-cache:/home/dev/.mix
# <<< STACK:cache_mounts

# >>> STACK:services
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: {{PROJECT_SLUG}}_dev
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
# <<< STACK:services

volumes:
  # Per-project (scoped to COMPOSE_PROJECT_NAME):
  commandhistory:
  claude-config:
  gh-config:
# >>> STACK:db_volume
  db-data:
# <<< STACK:db_volume
# >>> STACK:cache_volumes
  # Shared across all worktrees / projects (must be created up front with
  # `docker volume create`). One block per cache, naming it {{PROJECT_SLUG}}-<name>-cache:
  # hex-cache:
  #   external: true
  #   name: {{PROJECT_SLUG}}-hex-cache
  # mix-cache:
  #   external: true
  #   name: {{PROJECT_SLUG}}-mix-cache
# <<< STACK:cache_volumes
